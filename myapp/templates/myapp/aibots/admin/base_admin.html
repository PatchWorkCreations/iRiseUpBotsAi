<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        :root {
            --bg: #f6f8fc;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --primary: #2563eb;
            --primary-ink: #ffffff;
            --success: #16a34a;
            --danger: #dc2626;
            --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
            --radius: 14px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .admin-shell {
            max-width: 1160px;
            margin: 0 auto;
            padding: 24px 18px 40px;
        }

        .admin-header {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px 22px;
            margin-bottom: 18px;
        }

        .admin-title {
            margin: 0 0 4px 0;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .admin-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 0.93rem;
        }

        .admin-nav {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .admin-nav a {
            text-decoration: none;
            color: #1e293b;
            border: 1px solid var(--line);
            background: var(--surface-soft);
            padding: 9px 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.18s ease;
        }

        .admin-nav a:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
        }

        .admin-main {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 1.5rem;
        }

        h2 {
            margin: 0 0 12px;
            font-size: 1.12rem;
        }

        .muted { color: var(--muted); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 14px;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .btn:hover { transform: translateY(-1px); opacity: 0.95; }
        .btn-primary { background: var(--primary); color: var(--primary-ink); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-soft { background: #eef2ff; color: #3730a3; }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th, td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: middle;
            font-size: 0.92rem;
        }

        th {
            background: var(--surface-soft);
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: #475569;
        }

        tr:hover td { background: #f8fafc; }
        tr:last-child td { border-bottom: 0; }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .pill-success { background: #dcfce7; color: #166534; }
        .pill-danger { background: #fee2e2; color: #991b1b; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .card {
            background: var(--surface-soft);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }

        .card-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <header class="admin-header">
            <h1 class="admin-title">AI Bots Admin</h1>
            <p class="admin-subtitle">Manage subscriptions, renewals, and active Pro users.</p>
            <nav class="admin-nav">
                <a href="{% url 'custom_admin:dashboard' %}">Dashboard</a>
                <a href="{% url 'custom_admin:renewals' %}">Renewals</a>
                <a href="{% url 'custom_admin:pro_users_list' %}">Pro Users</a>
            </nav>
        </header>
        <main class="admin-main">
            {% block content %}
            {% endblock %}
        </main>
    </div>
</body>
</html>
